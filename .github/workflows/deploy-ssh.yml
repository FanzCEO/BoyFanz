name: Deploy BoyFanz via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/boyfanz

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            npm install

            # Build the application
            npm run build

            # Restart PM2 process
            su - fanz -c "pm2 restart boyfanz"

            # Verify deployment
            sleep 5
            curl -s http://localhost:3202/api/platform/current | grep -q "boyfanz" && echo "Deployment successful!" || echo "Deployment verification failed"

      - name: Notify on success
        if: success()
        run: echo "BoyFanz deployed successfully to production!"

      - name: Notify on failure
        if: failure()
        run: echo "BoyFanz deployment FAILED!"
