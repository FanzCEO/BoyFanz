# BoyFanz Production NGINX Configuration
# GOVERNANCE: No legacy paths, no stale builds, WebSocket via 443
# Deploy to: /etc/nginx/sites-available/boyfanz.conf

# B1: PERFORMANCE - Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
gzip_min_length 1024;
gzip_disable "msie6";

# B2: Brotli compression (if module available - gracefully degrades if not)
# Uncomment if libnginx-mod-http-brotli-filter is installed
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

# B3: PERFORMANCE - Optimized buffer sizes
client_body_buffer_size 128k;
client_max_body_size 10m;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;
output_buffers 2 32k;
postpone_output 1460;

# B4: PERFORMANCE - Conservative rate limiting (VPN-safe)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_status 429;

# B6: PERFORMANCE - Optimized keepalive settings
keepalive_timeout 65;
keepalive_requests 100;

# B7: PERFORMANCE - Microcache for public GET endpoints (1-3s TTL)
proxy_cache_path /var/cache/nginx/boyfanz levels=1:2 keys_zone=boyfanz_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 443 ssl http2;
    server_name boyfanz.fanz.website;

    # SSL certificates (adjust paths as needed)
    ssl_certificate /etc/letsencrypt/live/boyfanz.fanz.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boyfanz.fanz.website/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ════════════════════════════════════════════════════════════════════
    # A) HARD BLOCK LEGACY / BACKUP / ARCHIVE PATHS (410 Gone)
    # ════════════════════════════════════════════════════════════════════
    location ~* ^/(backup|backups|old|archive|archives|_old|_backup|dist-old|release-old|previous|prev|tmp|temp|staging|stage|dev|test|logs)(/|$) {
        return 410;
    }
    location ~* ^/(\.git|\.svn|\.hg|\.env|\.DS_Store)(/|$) {
        return 404;
    }
    location ~* ^/(node_modules|src|scripts|private|secrets)(/|$) {
        return 404;
    }

    # ════════════════════════════════════════════════════════════════════
    # B) FRONTEND: Serve current build ONLY
    # ════════════════════════════════════════════════════════════════════
    root /var/www/boyfanz/dist/public;
    index index.html;

    # Never cache HTML/app-shell (prevents "old build" ghosts)
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Release "$release_id" always;
        try_files $uri /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Release "$release_id" always;
        try_files $uri =404;
    }

    # Static assets: cache long (fingerprinted filenames) - SAFE
    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2|woff|ttf|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # PWA: NEVER cache the service worker file itself
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    # Kill switch file for emergency SW unregistration
    location = /sw-kill.json {
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    # ════════════════════════════════════════════════════════════════════
    # C) API: Proxy to backend
    # ════════════════════════════════════════════════════════════════════
    location /api/ {
        # B4: Rate limiting (20 req/s with burst)
        limit_req zone=api burst=10 nodelay;

        # B7: Microcache for public GET only (bypassed for authenticated users)
        proxy_cache boyfanz_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 2s; # 2 second TTL
        proxy_cache_bypass $http_authorization $cookie_connect.sid;
        proxy_no_cache $http_authorization $cookie_connect.sid;
        proxy_cache_key "$request_method$request_uri";
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Cookie/session handling
        proxy_cookie_path / "/; Secure; HttpOnly; SameSite=Lax";
        proxy_cookie_domain ~\.?boyfanz\.fanz\.website$ boyfanz.fanz.website;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Error handling - return JSON not HTML
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_error;
    }

    location @api_error {
        default_type application/json;
        return 503 '{"error":"ServiceUnavailable","message":"API temporarily unavailable","code":503}';
    }

    # ════════════════════════════════════════════════════════════════════
    # D) WEBSOCKETS: Proxy via 443 instead of :3001
    # Frontend should use: wss://boyfanz.fanz.website/ws
    # ════════════════════════════════════════════════════════════════════
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-specific timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }

    # ════════════════════════════════════════════════════════════════════
    # E) CSP: Strict but functional
    # ════════════════════════════════════════════════════════════════════
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.unsplash.com https://*.stripe.com; connect-src 'self' wss://boyfanz.fanz.website https://api.stripe.com https://images.unsplash.com; font-src 'self' data:; media-src 'self' blob: data:; object-src 'none'; base-uri 'self'; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'self';" always;

    # Additional security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;

    # ════════════════════════════════════════════════════════════════════
    # F) BUILD PROOF: Show what release is live
    # ════════════════════════════════════════════════════════════════════
    set $release_id "boyfanz-2.0.0";
    add_header X-Release "$release_id" always;
    add_header X-Served-By "nginx" always;

    # ════════════════════════════════════════════════════════════════════
    # G) SPA Fallback
    # ════════════════════════════════════════════════════════════════════
    location / {
        # B4: Rate limiting for general traffic
        limit_req zone=general burst=20 nodelay;

        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Release "$release_id" always;
        try_files $uri $uri/ /index.html;
    }

    # ════════════════════════════════════════════════════════════════════
    # H) Health check endpoint (for load balancers)
    # ════════════════════════════════════════════════════════════════════
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name boyfanz.fanz.website;
    return 301 https://$host$request_uri;
}
