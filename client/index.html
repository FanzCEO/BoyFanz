    <!-- PWA Service Worker Registration -->
    <script>
      // Detect if we're in development mode
      var isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

      // Remove loading screen when app loads (or after timeout for Safari)
      function hideLoadingScreen() {
        var loadingScreen = document.getElementById('pwa-loading');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.transition = 'opacity 0.5s ease-out';
          setTimeout(function() { loadingScreen.remove(); }, 500);
        }
      }

      // Remove loading screen on load event
      window.addEventListener('load', function() {
        setTimeout(hideLoadingScreen, 1000);
      });

      // Fallback: Remove loading screen after 5 seconds no matter what (Safari fix)
      setTimeout(hideLoadingScreen, 5000);

      // Only register Service Worker in production (Safari has issues in dev)
      if (!isDev && 'serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('BoyFanz SW registered:', registration.scope);
            })
            .catch(function(error) {
              console.error('SW registration failed:', error);
            });
        });
      }

      // Handle PWA install prompt
      var deferredPrompt;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
      });
    </script>
